    <!-- Prevent FOUC: apply saved theme and set up self-healing error handler -->
    <script>
      (function() {
        try {
          var ui = JSON.parse(localStorage.getItem('gestiva-ui') || '{}');
          var theme = ui.state?.theme || 'light';
          if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          // default to light mode on error
        }


        // Self-healing mechanism for bundle hash changes, chunk load failures, or ReferenceErrors
        window.addEventListener('error', function(e) {
          var msg = e.message || '';
          var isScriptError = e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK');
          var isMimeError = msg.indexOf('Failed to load module script') > -1 || msg.indexOf('MIME type') > -1;
          if (
            isScriptError ||
            isMimeError ||
            msg.indexOf('Zap is not defined') > -1 || 
            msg.indexOf('ReferenceError') > -1 ||
            msg.indexOf('loading-failed') > -1 ||
            msg.indexOf('Failed to fetch dynamically') > -1
          ) {
            var lastReload = sessionStorage.getItem('gestiva-auto-reload-time');
            var now = Date.now();
            if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
              sessionStorage.setItem('gestiva-auto-reload-time', now.toString());
              console.warn('Script error detected. Force reloading page to clear cache and load fresh assets...');
              window.location.reload(true);
            }
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
